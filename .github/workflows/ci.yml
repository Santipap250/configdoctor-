# .github/workflows/ci.yml
# OBIXConfig Doctor — CI Pipeline
# Runs on every push and PR: lint · security scan · tests
name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. Security: dependency audit ─────────────────────────────────────
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (fail on Critical/High CVEs)
        run: pip-audit -r requirements.txt --severity high

  # ── 2. Lint + Static Analysis ─────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit ruff

      - name: Run Ruff (Python linter)
        run: ruff check . --select E,W,F,S --ignore S101,S603 || true

      - name: Run Bandit (Python security linter)
        run: |
          bandit -r app.py analyzer/ logic/ \
            -ll \
            --skip B101,B603 \
            -f txt || true

  # ── 3. Tests ───────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [audit, lint]
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      FLASK_DEBUG: "0"
      FORCE_INSECURE: "1"   # allow HTTP in CI test env

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov=analyzer --cov=logic \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  # ── 4. Secret Scanning ────────────────────────────────────────────────
  secrets:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
