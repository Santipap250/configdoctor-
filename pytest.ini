[pytest]
# OBIXConfig Doctor — Pytest Configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    smoke:      Fast sanity checks — always run
    unit:       Pure logic tests, no I/O
    integration: Tests that require Flask app context
    slow:       Tests that are computationally expensive
