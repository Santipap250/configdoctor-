<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>500 — Server Error · OBIXConfig Doctor</title>
<link rel="stylesheet" href="/static/css/site-theme.css">
<style>
html,body{height:100%;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;padding:24px}
.err-bg{position:fixed;inset:0;pointer-events:none}
.err-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(248,113,113,0.06);transform:translate(-50%,-50%);animation:rPulse 5s ease-in-out infinite}
.err-ring:nth-child(1){width:180px;height:180px}
.err-ring:nth-child(2){width:340px;height:340px;animation-delay:.8s}
.err-ring:nth-child(3){width:520px;height:520px;animation-delay:1.6s}
@keyframes rPulse{0%,100%{opacity:.5}50%{opacity:1}}
.err-card{position:relative;z-index:2;background:rgba(11,21,32,0.95);border:1px solid rgba(248,113,113,0.18);border-radius:20px;padding:52px 44px 44px;text-align:center;max-width:440px;width:100%;backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.05);animation:fadeUp .5s var(--ease) both}
.err-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:20px 20px 0 0;background:linear-gradient(90deg,transparent,var(--red),var(--orange),transparent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.err-code{font-family:var(--font-head);font-size:80px;font-weight:900;line-height:1;color:var(--red);letter-spacing:-.04em;text-shadow:0 0 40px rgba(248,113,113,.4);margin-bottom:8px}
.err-title{font-family:var(--font-head);font-size:15px;font-weight:700;letter-spacing:.1em;color:var(--text);margin-bottom:12px}
.err-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:28px}
.err-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;border:1px solid rgba(248,113,113,0.3);background:var(--red-dim);color:var(--red);font-family:var(--font-head);font-size:10px;letter-spacing:.1em;margin-bottom:28px}
.err-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="err-bg">
  <div class="err-ring"></div>
  <div class="err-ring"></div>
  <div class="err-ring"></div>
</div>
<div class="err-card">
  <div class="err-tag">🔥 INTERNAL ERROR</div>
  <div class="err-code">500</div>
  <div class="err-title">เกิดข้อผิดพลาดภายในระบบ</div>
  <div class="err-desc">Server พบปัญหาที่ไม่คาดคิด<br>กรุณาลองใหม่ หรือแจ้งผู้พัฒนา</div>
  <div class="err-actions">
    <a href="/app" class="v5-btn v5-btn-primary" style="--green:var(--red);--green-dim:var(--red-dim)">🔄 ลองใหม่</a>
    <a href="/landing" class="v5-btn v5-btn-secondary">↩ หน้าหลัก</a>
  </div>
</div>
</body>
</html>
